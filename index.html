<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ember</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
  </head>

  <body>
    <div class="app">
      <aside class="sidebar">
        <button
          class="sidebar-close-btn"
          id="closeSidebarBtn"
          aria-label="Close Sidebar"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="sidebar-brand">
          <div class="sidebar-logo-icon">
            <div class="ember-badge-icon">
              <i class="fa-solid fa-fire"></i>
            </div>
          </div>
          <span class="ember-wordmark">Ember</span>
        </div>

        <nav class="sidebar-nav">
          <a class="nav-item" href="#"><i class="fa-solid fa-house"></i> Home</a>
          <a class="nav-item" href="#"
            ><i class="fa-solid fa-magnifying-glass"></i> Search</a
          >
        </nav>

        <div class="library-header">
          <div class="library-label">
            <i class="fa-solid fa-book-open"></i>
            Your Library
          </div>
        </div>

        <div class="library-list"></div>
      </aside>

      <main class="main">
        <div class="mobile-header">
          <div class="mobile-brand">
            <div class="ember-badge-icon">
              <i class="fa-solid fa-fire"></i>
            </div>
            <span class="mobile-wordmark">Ember</span>
          </div>

          <button
            class="hamburger-menu-btn"
            id="openSidebarBtn"
            aria-label="Open Sidebar"
          >
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>

        <div class="hero"></div>

        <div class="tracklist-area">
          <table class="track-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Title</th>
                <th></th>
                <th><i class="fa-regular fa-clock"></i></th>
              </tr>
            </thead>
            <tbody class="songList"></tbody>
          </table>
        </div>
      </main>

      <footer class="player">
        <div class="player-track"></div>

        <div class="player-center">
          <div class="player-controls">
            <button class="ctrl-btn shuffle-btn">
              <i class="fa-solid fa-shuffle"></i>
            </button>

            <button class="ctrl-btn prev">
              <i class="fa-solid fa-backward-step"></i>
            </button>

            <button class="ctrl-btn play-pause">
              <i class="fa-solid fa-pause"></i>
            </button>

            <button class="ctrl-btn next">
              <i class="fa-solid fa-forward-step"></i>
            </button>

            <button class="ctrl-btn repeat-btn">
              <i class="fa-solid fa-repeat"></i>
            </button>
          </div>

          <div class="progress-bar-wrap">
            <span class="time-label">1:01</span>

            <div class="progress-track">
              <div class="progress-fill">
                <div class="progress-dot"></div>
              </div>
            </div>

            <span class="time-label">2:16</span>
          </div>
        </div>

        <div class="player-right">
          <button class="right-btn volume-btn">
            <i class="fa-solid fa-volume-high"></i>
          </button>

          <div class="volume-bar">
            <div class="volume-fill"></div>
          </div>
        </div>
      </footer>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
